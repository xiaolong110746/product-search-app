<html lang="zh-CN">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">

   <link rel="stylesheet" href="ag-grid-community-31.0.3/package/styles/ag-grid.min.css">
   <link rel="stylesheet" href="ag-grid-community-31.0.3/package/styles/ag-theme-alpine.min.css">
   <!-- AG Grid 核心库 -->
   <script src="ag-grid-community-31.0.3/package/dist/ag-grid-community.min.js"></script>

   <script src="xlsx.full.min.js"></script>
   <!-- 拼音库 -->

    <style>
        :root { --primary-color: #2563eb; --bg-color: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; padding: 8px; }
        .container { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 12px; min-height: 0; overflow: hidden; width: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 12px; flex-shrink: 0; }
        h1 { margin: 0; font-size: 1.5rem; color: #0f172a; }
        .subtitle { font-size: 0.9rem; color: #64748b; margin-top: 2px; }
        
        .btn { padding: 10px 16px; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; border: 1px solid #e2e8f0; background: white; color: #475569; transition: all 0.2s; }
        .btn:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn-primary { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { color: #dc2626; border-color: #fca5a5; }
        .btn-danger:hover { background: #fef2f2; }
        #fileInput { display: none; }
        
        .search-box { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; position: relative; flex-shrink: 0; }
        .search-container {
            flex: 1; padding: 8px 12px; font-size: 1.1rem; border: 2px solid #e2e8f0; border-radius: 8px;
            outline: none; transition: all 0.2s; display: flex; align-items: center; flex-wrap: wrap;
            min-height: 48px; background: white; cursor: text;
        }
        .search-container:focus-within { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        .search-tag {
            display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px 4px 12px;
            background: linear-gradient(135deg, #dbeafe, #bfdbfe); color: #1e40af; border-radius: 14px;
            font-size: 0.9rem; white-space: nowrap; box-shadow: 0 1px 3px rgba(37,99,235,0.15);
            transition: all 0.15s; margin: 0 3px;
        }
        .search-tag:hover { box-shadow: 0 2px 6px rgba(37,99,235,0.25); }
        .search-tag-text { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
        .search-tag-close {
            display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px;
            border-radius: 50%; font-size: 13px; line-height: 1; cursor: pointer; color: #1e40af;
            transition: all 0.15s; flex-shrink: 0; font-weight: bold;
        }
        .search-tag-close:hover { background-color: rgba(30,58,138,0.15); }
        .search-inline-input {
            border: none; outline: none; font-size: 1.1rem;
            font-family: inherit; padding: 4px 0; background: transparent;
            margin: 0;
        }
        
        /* 状态徽章样式 */
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 18px; border-radius: 20px;
            font-size: 1.1rem; font-weight: 600;
            opacity: 0; visibility: hidden; 
            transition: all 0.2s ease;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .status-badge.visible {
            opacity: 1;
            visibility: visible;
        }

        .status-badge.found {
            background-color: #dcfce7;
            color: #15803d;
            box-shadow: 0 2px 8px rgba(21, 128, 61, 0.2);
        }

        .status-badge.notfound {
            background-color: #fee2e2;
            color: #dc2626;
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.2);
        }
        
        .grid-container { flex: 1; min-height: 0; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; width: 100%; }
        
        /* AG Grid 表格字体放大 */
        .ag-theme-alpine { font-size: 18px; }
        .ag-theme-alpine .ag-header-cell-label { justify-content: center; }
        .ag-theme-alpine .ag-header-cell-text { font-size: 18px; font-weight: 600; }
        .ag-theme-alpine .ag-cell { font-size: 18px; }
        .ag-theme-alpine .ag-cell-value { display: flex; align-items: center; justify-content: center; }
        
        /* 行选中高亮样式 */
        .ag-theme-alpine .ag-row-selected { background-color: #dbeafe !important; }
        .ag-theme-alpine .ag-row-selected:hover { background-color: #bfdbfe !important; }
        .ag-theme-alpine .ag-row:hover { background-color: #f1f5f9; }
        
        .highlight-text { background-color: #fef08a; color: #854d0e; padding: 0 4px; border-radius: 2px; font-weight: bold; }
        
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 1rem; color: #64748b; flex-wrap: wrap; gap: 8px; flex-shrink: 0; }
        
        /* 提示信息样式 */
        .info-box {
            margin-top: 8px;
            padding: 10px 14px;
            background-color: #dbeafe;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1e40af;
            line-height: 1.5;
            flex-shrink: 0;
        }
        .info-box.success { background-color: #dcfce7; color: #166534; }
        .info-box.warning { background-color: #fef3c7; color: #92400e; }
        .info-box.error { background-color: #fee2e2; color: #991b1b; }
        
        .file-name { font-weight: 600; }
        
        /* 加载动画 */
        .loading { 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 20px; color: #64748b;
        }
        
        /* 筛选状态提示区 */
        .filter-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 12px;
            margin-bottom: 0;
            background-color: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #92400e;
            flex-wrap: wrap;
            flex-shrink: 0;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease, border-width 0.3s ease, margin-bottom 0.3s ease, border-color 0.3s ease;
            border-width: 0;
            border-color: transparent;
        }
        .filter-status.visible {
            max-height: 60px;
            opacity: 1;
            padding: 8px 12px;
            border-width: 1px;
            margin-bottom: 10px;
            border-color: #fcd34d;
        }
        .filter-status .filter-tags-container {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            align-items: center;
            overflow: hidden;
            height: 28px;
        }
        
        /* 筛选标签样式 - 增强交互 */
        .filter-status .filter-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            background-color: #fff;
            border-radius: 4px;
            font-size: 0.9rem;
            flex-shrink: 1;
            min-width: 60px;
            height: 28px;
            position: relative;
            cursor: pointer;
            transition: box-shadow 0.2s ease;
            user-select: none;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        
        .filter-status .filter-tag.search {
            background-color: #dbeafe;
            color: #1e40af;
        }
        
        .filter-status .filter-tag.column {
            background-color: #dcfce7;
            color: #166534;
        }
        
        /* 悬停效果 */
        .filter-status .filter-tag:hover {
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }
        
        /* 关闭按钮遮罩层 */
        .filter-status .filter-tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 1;
        }
        
        .filter-status .filter-tag:hover::before {
            opacity: 1;
        }
        
        /* 关闭按钮图标 */
        .filter-status .filter-tag::after {
            content: '✕';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            opacity: 0;
            transition: all 0.2s ease;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
            z-index: 3;
            background-color: rgba(220, 38, 38, 0.9);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        
        .filter-status .filter-tag:hover::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        /* 标签文字保持在最上层 */
        .filter-status .filter-tag .tag-text {
            transition: opacity 0.2s ease;
            position: relative;
            z-index: 2;
            white-space: nowrap;
        }
        
        /* 悬停时文字保持可见 */
        
        /* 删除动画 - 缩小消失 */
        .filter-status .filter-tag.removing {
            pointer-events: none;
            animation: tagRemove 0.35s ease-out forwards;
        }
        
        @keyframes tagRemove {
            0% {
                opacity: 1;
                transform: scaleX(1);
                max-width: 300px;
                padding: 4px 10px;
                margin-right: 6px;
            }
            40% {
                opacity: 0.8;
                transform: scaleX(0.8);
            }
            100% {
                opacity: 0;
                transform: scaleX(0);
                max-width: 0;
                padding-left: 0;
                padding-right: 0;
                margin-right: 0;
            }
        }
        
        .filter-status .clear-btn {
            padding: 6px 14px;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }
        .filter-status .btn-group {
            margin-left: auto;
            display: flex;
            gap: 4px;
        }
        .filter-status .clear-btn.search {
            background-color: #fca5a5;
            color: #991b1b;
        }
        .filter-status .clear-btn.search:hover {
            background-color: #f87171;
            color: white;
        }
        .filter-status .clear-btn.filter {
            background-color: #f87171;
        }
        .filter-status .clear-btn.filter:hover {
            background-color: #ef4444;
        }
        .filter-status .clear-btn.all {

            background-color: #b91c1c;

        /* 自定义右键菜单 */
        .context-menu {

            border-radius: 6px;

        }

            width: 16px;
            text-align: center;

<div class="container">

        </div>

            <button class="btn btn-primary" onclick="triggerFileSelect()">📂 导入 Excel</button>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="handleFileUpload(event)">
            <button class="btn" onclick="autoSizeAll()">↔️ 自动列宽</button>
            <button class="btn btn-danger" onclick="clearSavedData()">🗑️ 清除记忆</button>
        </div>
    </header>

    <div class="search-box">
        <div id="searchContainer" class="search-container">
            <input type="text" id="searchInput" class="search-inline-input" placeholder="扫码或输入名称/拼音，按回车添加..." autofocus>
        </div>
        <div id="statusBadge" class="status-badge">

        </div>

        <span>🔍 当前操作：</span>
        <div id="filterTags" class="filter-tags-container"></div>
        <div class="btn-group">
            <button class="clear-btn search" onclick="clearSearchOnly()">清除搜索</button>
            <button class="clear-btn filter" onclick="clearFilterOnly()">清除筛选</button>
            <button class="clear-btn all" onclick="clearAllFilters()">清除全部</button>
        </div>

<script>
// ==========================================
// 全局状态
// ==========================================
let gridApi = null;
let allData = [];
let currentSearchText = ''; 
let lastFilteredCount = 0; // 记录上次筛选结果数量

// 存储键名
const STORAGE_KEY = 'product_query_excel_data';

// ==========================================
// 存储函数 - 使用 localStorage
// ==========================================
function saveData(fileName, arrayBuffer, recordCount) {
    try {
        // 将 ArrayBuffer 转为 Base64 字符串
        const base64 = arrayBufferToBase64(arrayBuffer);
        
        const data = {
            fileName: fileName,
            fileData: base64,
            recordCount: recordCount,
            savedAt: new Date().toISOString()
        };
        
        // localStorage 有大小限制（约5MB），如果数据太大需要分片
        const jsonStr = JSON.stringify(data);
        
        // 检查大小
        if (jsonStr.length > 4 * 1024 * 1024) { // 4MB 警告阈值
            console.warn('⚠️ 文件较大，可能超出存储限制');
        }
        
        localStorage.setItem(STORAGE_KEY, jsonStr);
        console.log('✅ 数据已保存到 localStorage:', fileName);
        return true;
    } catch (e) {
        console.error('❌ 保存失败:', e);
        
        // 如果是配额超限错误
        if (e.name === 'QuotaExceededError' || e.code === 22) {
            showToast('⚠️ 文件太大，超出浏览器存储限制，无法记住此文件');
        }
        return false;
    }
}

function loadData() {
    try {
        const jsonStr = localStorage.getItem(STORAGE_KEY);
        if (!jsonStr) return null;
        
        const data = JSON.parse(jsonStr);
        // Base64 转 ArrayBuffer
        data.fileData = base64ToArrayBuffer(data.fileData);
        console.log('✅ 从 localStorage 加载数据:', data.fileName);
        return data;
    } catch (e) {
        console.error('❌ 加载失败:', e);
        return null;
    }
}

function clearData() {
    try {
        localStorage.removeItem(STORAGE_KEY);
        console.log('✅ 已清除保存的数据');
        return true;
    } catch (e) {
        console.error('❌ 清除失败:', e);
        return false;
    }
}

// ArrayBuffer 转 Base64
function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = '';
    for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
}

// Base64 转 ArrayBuffer
function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes.buffer;
}

// ==========================================
// 智能高亮渲染器 - 用于文本格式列
// ==========================================
class SmartHighlightRenderer {
    init(params) {
        this.eGui = document.createElement('span');
        this.refresh(params);
    }

    getGui() { return this.eGui; }

    refresh(params) {
        const text = String(params.value || '');
        const keywords = parseKeywords(currentSearchText);
        
        if (keywords.length === 0) {
            this.eGui.innerHTML = this.escapeHtml(text);
            return true;
        }

        // 多关键字高亮：逐个关键字查找并标记位置
        let highlighted = this.escapeHtml(text);
        const lowerText = text.toLowerCase();
        
        // 收集所有需要高亮的位置（避免重叠）
        let markPositions = [];
        
        for (const kw of keywords) {
            if (!kw) continue;
            let idx = lowerText.indexOf(kw);
            while (idx !== -1) {
                markPositions.push({ start: idx, end: idx + kw.length });
                idx = lowerText.indexOf(kw, idx + kw.length);
            }
        }

        // 如果没有直接文本匹配，尝试拼音匹配（仅商品名称列）
        if (markPositions.length === 0 && params.colDef.field === 'name' && params.data && params.data._pinyinFull) {
            const pinyinFull = params.data._pinyinFull;
            for (const kw of keywords) {
                if (!kw) continue;
                let idx = pinyinFull.indexOf(kw);
                while (idx !== -1) {
                    markPositions.push({ start: idx, end: idx + kw.length });
                    idx = pinyinFull.indexOf(kw, idx + kw.length);
                }
            }
        }

        // 合并重叠区间
        markPositions.sort((a, b) => a.start - b.start);
        let merged = [];
        for (const pos of markPositions) {
            if (merged.length > 0 && pos.start <= merged[merged.length - 1].end) {
                merged[merged.length - 1].end = Math.max(merged[merged.length - 1].end, pos.end);
            } else {
                merged.push({ start: pos.start, end: pos.end });
            }
        }

        // 从后往前替换，避免索引偏移
        if (merged.length > 0) {
            let chars = Array.from(highlighted);
            for (let i = merged.length - 1; i >= 0; i--) {
                const { start, end } = merged[i];
                const matched = chars.slice(start, end).join('');
                chars.splice(start, end - start, `<span class="highlight-text">${matched}</span>`);
            }
            highlighted = chars.join('');
        }

        this.eGui.innerHTML = highlighted;
        return true;
    }

    escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        }[m]));
    }
}

// ==========================================
// 数字格式渲染器 - 用于数字格式列（支持高亮）
// ==========================================
class NumericRenderer {
    init(params) {
        this.eGui = document.createElement('span');
        this.refresh(params);
    }

    getGui() { return this.eGui; }

    refresh(params) {
        const value = params.value;
        const keywords = parseKeywords(currentSearchText);
        
        if (value === null || value === undefined || value === '') {
            this.eGui.innerHTML = '';
            return true;
        }
        
        // 直接使用数字值，格式化为1位小数
        let displayText;
        if (typeof value === 'number') {
            displayText = value.toFixed(1);
        } else {
            const num = parseFloat(value);
            displayText = isNaN(num) ? String(value) : num.toFixed(1);
        }
        
        if (keywords.length === 0) {
            this.eGui.innerHTML = this.escapeHtml(displayText);
            return true;
        }
        
        // 多关键字高亮
        let highlighted = this.escapeHtml(displayText);
        const lowerText = displayText.toLowerCase();
        
        let markPositions = [];
        for (const kw of keywords) {
            if (!kw) continue;
            let idx = lowerText.indexOf(kw);
            while (idx !== -1) {
                markPositions.push({ start: idx, end: idx + kw.length });
                idx = lowerText.indexOf(kw, idx + kw.length);
            }
        }

        // 合并重叠区间
        markPositions.sort((a, b) => a.start - b.start);
        let merged = [];
        for (const pos of markPositions) {
            if (merged.length > 0 && pos.start <= merged[merged.length - 1].end) {
                merged[merged.length - 1].end = Math.max(merged[merged.length - 1].end, pos.end);
            } else {
                merged.push({ start: pos.start, end: pos.end });
            }
        }

        if (merged.length > 0) {
            let chars = Array.from(highlighted);
            for (let i = merged.length - 1; i >= 0; i--) {
                const { start, end } = merged[i];
                const matched = chars.slice(start, end).join('');
                chars.splice(start, end - start, `<span class="highlight-text">${matched}</span>`);
            }
            highlighted = chars.join('');
        }

        this.eGui.innerHTML = highlighted;
        return true;
    }

    escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        }[m]));
    }
}

// ==========================================
// 数据处理函数
// ==========================================
function processPinyin(text) {
    if (!text) return '';
    if (typeof pinyinPro !== 'undefined') {
        try {
            return pinyinPro.pinyin(text, { pattern: 'first', toneType: 'none' }).replace(/\s/g, '').toLowerCase();
        } catch (e) {
            return '';
        }
    }
    return '';
}

function parseExcelData(arrayBuffer) {
    try {
        const data = new Uint8Array(arrayBuffer);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: '' });
        
        return jsonData.map(row => {
            const clean = {};
            Object.keys(row).forEach(k => clean[k.trim()] = row[k]);
            const get = keys => { for (let k of keys) if (clean[k]) return clean[k]; return ''; };
            const getNum = keys => {
                const val = get(keys);
                if (val === '' || val === null || val === undefined) return null;
                const num = parseFloat(val);
                return isNaN(num) ? null : num;
            };
            
            return {
                name: get(['商品名称', '品名', '名称']),
                cost: getNum(['进价（条）', '进价']),
                priceStrip: getNum(['售价（条）', '条售价']),
                suggestStrip: getNum(['建议价（条）']),
                pricePack: getNum(['售价（包）', '包售价']),
                suggestPack: getNum(['建议价（包）']),
                barcodeStrip: get(['条码（条）', '条码', '商品条码', '条形码', '条码(条)']),
                barcodePack: get(['条码（包）', '包码', '条码(包)', '包条码', '包的条码']),
                remark: get(['备注', '说明', '注释', '标记'])
            };
        }).filter(item => item.name || item.barcodeStrip || item.barcodePack);
    } catch (e) {
        console.error('解析Excel失败:', e);
        return [];
    }
}

function processData(data, source) {
    // 添加拼音
    data.forEach(item => {
        item._pinyinFull = processPinyin(item.name);
        item.namePinyin = item._pinyinFull;
    });
    
    allData = data;
    
    if (gridApi) {
        gridApi.setGridOption('rowData', allData);
        // 自动调整列宽适应内容
        setTimeout(() => {
            gridApi.autoSizeAllColumns();
        }, 100);
    }
    
    document.getElementById('dataSource').innerHTML = `数据：<span class="file-name">${source}</span>`;
    document.getElementById('recordCount').textContent = `共 ${data.length} 条`;
}

function triggerFileSelect() {
    document.getElementById('fileInput').click();
}

function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    // 先清除搜索和筛选
    currentKeywords = [];
    cursorPosition = 0;
    renderSearchTags();
    input.value = '';
    currentSearchText = '';
    if (gridApi) {
        gridApi.setFilterModel(null);
    }
    // 隐藏筛选状态提示区
    document.getElementById('filterStatus').classList.remove('visible');
    hideStatus();
    
    showToast('📖 正在读取文件...');
    
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const arrayBuffer = e.target.result;
            const formatted = parseExcelData(arrayBuffer);
            
            if (formatted.length === 0) {
                showToast('❌ 文件为空或格式不正确');
                return;
            }
            
            // 显示数据
            processData(formatted, file.name);
            
            // 保存到 localStorage
            const saved = saveData(file.name, arrayBuffer, formatted.length);
            
            if (saved) {
                updateInfoBox(true, file.name, formatted.length);
                showToast(`✅ 已导入并记住「${file.name}」，共 ${formatted.length} 条`);
            } else {
                updateInfoBox(false);
                showToast(`✅ 导入成功，但文件太大无法记住`);
            }
            
        } catch (err) {
            console.error('解析失败:', err);
            showToast('❌ 解析失败: ' + err.message);
        }
    };
    
    reader.onerror = function() {
        showToast('❌ 文件读取失败');
    };
    
    reader.readAsArrayBuffer(file);
    event.target.value = '';
}

// ==========================================
// 搜索与扫码逻辑
// ==========================================
const input = document.getElementById('searchInput');
const badge = document.getElementById('statusBadge');
const iconSpan = document.getElementById('iconSpan');
const statusText = document.getElementById('statusText');

let notFoundTimer = null;
let searchDebounceTimer = null;
let currentKeywords = []; // 当前搜索关键字数组
let cursorPosition = 0; // 虚拟光标位置：0~N，表示光标在第 cursorPosition 个标签之前

// 点击搜索容器：检测点击位置，移动光标到对应标签间隙
function handleContainerClick(e) {
    if (e.target.classList.contains('search-tag-close')) return;
    if (e.target === input) return;
    if (e.target.closest('.search-tag')) {
        input.focus();
        return;
    }
    // 点击空白区域：根据水平坐标判断光标应在哪个间隙
    const tags = Array.from(this.querySelectorAll('.search-tag'));
    if (tags.length === 0) {
        cursorPosition = 0;
    } else {
        const clickX = e.clientX;
        cursorPosition = tags.length; // 默认：末尾
        if (clickX < tags[0].getBoundingClientRect().left) {
            cursorPosition = 0;
        } else {
            for (let i = 1; i < tags.length; i++) {
                const prevRight = tags[i - 1].getBoundingClientRect().right;
                const currLeft = tags[i].getBoundingClientRect().left;
                if (clickX < (prevRight + currLeft) / 2) {
                    cursorPosition = i;
                    break;
                }
            }
        }
    }
    renderSearchTags();
    input.focus();
}
document.getElementById('searchContainer').addEventListener('click', handleContainerClick);

// ==========================================
// 关键字标签管理
// ==========================================
function addKeyword(keyword, position = null) {
    keyword = keyword.trim().toLowerCase();
    if (!keyword) return;
    if (currentKeywords.includes(keyword)) return;
    const insertPos = position !== null ? position : cursorPosition;
    currentKeywords.splice(insertPos, 0, keyword);
    cursorPosition = insertPos + 1;
    renderSearchTags();
    triggerSearch();
}

function removeKeyword(idx) {
    if (idx < 0 || idx >= currentKeywords.length) return;
    currentKeywords.splice(idx, 1);
    if (cursorPosition > idx) cursorPosition--;
    renderSearchTags();
    triggerSearch();
    input.focus();
}

function clearAllKeywords() {
    currentKeywords = [];
    cursorPosition = 0;
    renderSearchTags();
    triggerSearch();
}

// 创建单个标签 DOM 元素
function createTagElement(kw, idx) {
    const tag = document.createElement('span');
    tag.className = 'search-tag';
    const textSpan = document.createElement('span');
    textSpan.className = 'search-tag-text';
    textSpan.textContent = kw;
    const closeBtn = document.createElement('span');
    closeBtn.className = 'search-tag-close';
    closeBtn.textContent = '×';
    closeBtn.onclick = function(e) {
        e.stopPropagation();
        removeKeyword(idx);
    };
    tag.appendChild(textSpan);
    tag.appendChild(closeBtn);
    return tag;
}

// 根据光标位置动态调整 input 宽度
function updateInputStyle() {
    const hasText = input.value.length > 0;
    const atEnd = cursorPosition >= currentKeywords.length;
    if (hasText) {
        input.style.flex = '0 0 auto';
        input.style.minWidth = '60px';
        input.style.width = '';
        input.style.padding = '';
        input.style.caretColor = 'auto';
    } else if (atEnd) {
        input.style.flex = '1 1 auto';
        input.style.minWidth = '100px';
        input.style.width = '';
        input.style.padding = '';
        input.style.caretColor = 'auto';
    } else {
        // 光标在中间：保留极小宽度让浏览器能渲染 caret，否则光标不可见
        input.style.flex = '0 0 auto';
        input.style.minWidth = '2px';
        input.style.width = '2px';
        input.style.padding = '0';
        input.style.caretColor = '#2563eb';
    }
}

// 重新渲染标签，将 input 插入到 cursorPosition 对应位置作为光标指示
function renderSearchTags() {
    const container = document.getElementById('searchContainer');
    const inputEl = document.getElementById('searchInput');
    // 安全取出 input（避免被清空）
    if (inputEl.parentNode === container) {
        container.removeChild(inputEl);
    }
    // 清空所有子元素
    container.innerHTML = '';
    // 插入光标前的标签
    for (let i = 0; i < cursorPosition && i < currentKeywords.length; i++) {
        container.appendChild(createTagElement(currentKeywords[i], i));
    }
    // 插入 input（= 光标位置）
    container.appendChild(inputEl);
    // 插入光标后的标签
    for (let i = cursorPosition; i < currentKeywords.length; i++) {
        container.appendChild(createTagElement(currentKeywords[i], i));
    }
    // 更新 placeholder
    input.placeholder = currentKeywords.length === 0 ? '扫码或输入名称/拼音，按回车添加...' : '';
    // 调整 input 宽度
    updateInputStyle();
}

function triggerSearch() {
    // 清除实时搜索的遗留定时器，防止扫码完成后旧定时器污染搜索结果
    if (searchDebounceTimer) {
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = null;
    }
    const query = currentKeywords.join(',');
    lastSearchedKeywordsStr = ''; // 重置，确保 filterData 一定会执行
    filterData(query);
}

function initScannerLogic() {
    // 实时搜索：每输入一个字符就搜索（防抖 256ms）
    input.addEventListener('input', function(e) {
        const val = input.value.trim();
        // 如果正在扫码，不触发实时搜索
        if (scannerIsScanning) return;

        if (notFoundTimer) {
            clearTimeout(notFoundTimer);
            notFoundTimer = null;
        }

        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);

        if (val === '') {
            // 输入框清空，用已有标签搜索
            lastSearchedKeywordsStr = '';
            filterData(currentKeywords.join(','));
            searchDebounceTimer = null;
            updateInputStyle();
            return;
        }

        searchDebounceTimer = setTimeout(() => {
            // 输入框有文字，临时按输入框内容搜索（不添加为标签）
            lastSearchedKeywordsStr = '';
            const query = currentKeywords.length > 0
                ? currentKeywords.join(',') + ',' + val
                : val;
            filterData(query);
            searchDebounceTimer = null;
        }, 256);
        updateInputStyle();
    });

    // 回车/逗号：在光标位置插入新标签
    // Backspace：输入框为空时删除光标前的标签
    // Delete：输入框为空时删除光标后的标签
    // ArrowLeft/Right：光标在边界时移动光标位置
    input.addEventListener('keydown', function(e) {
        // 扫描枪正在输入时，跳过所有处理（交给全局扫描枪捕获器）
        if (scannerIsScanning) return;

        if (e.key === 'Enter' || e.key === ',' || e.key === '，') {
            e.preventDefault();
            const val = input.value.trim();
            if (val) {
                addKeyword(val); // 在当前光标位置插入
                input.value = '';
                updateInputStyle();
                input.focus(); // renderSearchTags 重建DOM后焦点丢失，需手动恢复
            }
        }

        // 输入框为空时，Backspace 删除光标前方的标签
        if (e.key === 'Backspace' && input.value === '' && cursorPosition > 0) {
            e.preventDefault();
            currentKeywords.splice(cursorPosition - 1, 1);
            cursorPosition--;
            renderSearchTags();
            triggerSearch();
            input.focus();
        }

        // 输入框为空时，Delete 删除光标后方的标签
        if (e.key === 'Delete' && input.value === '' && cursorPosition < currentKeywords.length) {
            e.preventDefault();
            currentKeywords.splice(cursorPosition, 1);
            renderSearchTags();
            triggerSearch();
            input.focus();
        }

        // 左箭头：输入框为空或光标在最前时，光标向左移动一个标签
        if (e.key === 'ArrowLeft' && (input.value === '' || input.selectionStart === 0) && cursorPosition > 0) {
            e.preventDefault();
            cursorPosition--;
            renderSearchTags();
            input.focus();
        }

        // 右箭头：输入框为空或光标在最后时，光标向右移动一个标签
        if (e.key === 'ArrowRight' && (input.value === '' || input.selectionStart === input.value.length) && cursorPosition < currentKeywords.length) {
            e.preventDefault();
            cursorPosition++;
            renderSearchTags();
            input.focus();
        }

        // Home：光标移到最前面
        if (e.key === 'Home') {
            e.preventDefault();
            cursorPosition = 0;
            renderSearchTags();
            input.focus();
        }

        // End：光标移到最后面
        if (e.key === 'End') {
            e.preventDefault();
            cursorPosition = currentKeywords.length;
            renderSearchTags();
            input.focus();
        }
    });
}

// ==========================================
// 全局扫描枪捕获 - 无论搜索框是否聚焦都能接收扫码输入
// ==========================================
let scannerBuffer = '';         // 扫描枪输入缓冲区
let scannerLastTime = 0;       // 上一次接收字符的时间戳
let scannerTimeout = null;     // 超时清除缓冲区的定时器
let scannerIsScanning = false; // 标记是否正在接收扫描枪输入
let scannerLeakedLen = 0;      // 确认为扫描枪时搜索框中泄露的字符长度
const SCANNER_MAX_GAP = 80;    // 扫描枪字符最大间隔（毫秒），扫描枪通常 < 50ms，人工打字通常 > 100ms
const SCANNER_MIN_LENGTH = 3;  // 最短有效扫码长度

function initGlobalScannerCapture() {
    document.addEventListener('keydown', function(e) {
        // 忽略组合键（Ctrl/Alt/Meta），避免干扰正常快捷键操作
        if (e.ctrlKey || e.altKey || e.metaKey) return;

        const now = Date.now();
        const isInputFocused = document.activeElement === input;

        // 扫描枪输入结束通常是 Enter 键
        if (e.key === 'Enter') {
            if (scannerIsScanning && scannerBuffer.length >= SCANNER_MIN_LENGTH) {
                e.preventDefault();
                // 移除泄露到内嵌输入框中的字符
                if (isInputFocused && scannerLeakedLen > 0) {
                    const val = input.value;
                    if (val.length >= scannerLeakedLen) {
                        input.value = val.substring(0, val.length - scannerLeakedLen);
                    }
                }
                // 以关键字标签方式追加到末尾，自动去重
                addKeyword(scannerBuffer, currentKeywords.length);
                // 无论是否重复，都清除实时搜索的遗留定时器，防止泄露字符的定时器污染
                if (searchDebounceTimer) { clearTimeout(searchDebounceTimer); searchDebounceTimer = null; }
                // 确保光标在末尾
                cursorPosition = currentKeywords.length;
                input.value = '';
                renderSearchTags();
                scannerBuffer = '';
                scannerIsScanning = false;
                scannerLeakedLen = 0;
                clearTimeout(scannerTimeout);
                if (!isInputFocused) input.focus();
            } else {
                // 不是扫码，正常处理
                scannerBuffer = '';
                scannerIsScanning = false;
                scannerLeakedLen = 0;
            }
            return;
        }

        // 只捕获可打印字符（key 长度为1的就是单个字符）
        if (e.key.length === 1) {
            // 判断字符到达速度是否属于扫描枪特征（极快连续输入）
            if (scannerBuffer.length === 0 || (now - scannerLastTime) < SCANNER_MAX_GAP) {
                scannerBuffer += e.key;
                scannerLastTime = now;

                // 从非扫码状态变为扫码状态时，记录搜索框中已泄露的字符长度
                if (!scannerIsScanning && scannerBuffer.length >= 2) {
                    scannerIsScanning = true;
                    scannerLeakedLen = scannerBuffer.length - 1; // 第1个字符没被拦截，已泄露
                }

                // 如果搜索框有焦点且正在扫码，阻止字符自然输入（避免追加到旧内容）
                if (isInputFocused && scannerIsScanning) {
                    e.preventDefault();
                }

                // 重置超时定时器：超过一定时间没有新字符，说明不是扫描枪，清空缓冲区
                clearTimeout(scannerTimeout);
                scannerTimeout = setTimeout(() => {
                    scannerBuffer = '';
                    scannerIsScanning = false;
                }, SCANNER_MAX_GAP * 2);
            } else {
                // 间隔太长，不是扫描枪，重置缓冲区并记录当前字符
                scannerBuffer = e.key;
                scannerLastTime = now;
                scannerIsScanning = false;
            }
        }
    });
}

// 解析搜索文本为多个关键字数组（支持空格、逗号、中文逗号分隔）
function parseKeywords(text) {
    if (!text || !text.trim()) return [];
    return text.split(/[,，\s]+/).map(k => k.trim().toLowerCase()).filter(k => k.length > 0);
}

// 记录上次搜索过的关键字，用于判断是否需要重新搜索
let lastSearchedKeywordsStr = '';

function filterData(query) {
    if (!gridApi) return;
    currentSearchText = query;
    
    if (!query.trim()) {
        lastSearchedKeywordsStr = '';
        gridApi.setGridOption('rowData', allData);
        updateCount(allData.length);
        lastFilteredCount = allData.length;
        hideStatus();
        updateFilterStatus();
        return;
    }
    
    const keywords = parseKeywords(query);
    
    // 判断是否与上次搜索相同，相同则跳过（节约性能）
    const keywordsStr = keywords.join(',');
    if (keywordsStr === lastSearchedKeywordsStr) return;
    lastSearchedKeywordsStr = keywordsStr;
    
    const filtered = allData.filter(item => {
        // 任一关键字匹配即保留（OR 逻辑）
        return keywords.some(kw => {
            const hasText = Object.values(item).some(val => String(val).toLowerCase().includes(kw));
            const hasPinyin = item.namePinyin && item.namePinyin.includes(kw);
            return hasText || hasPinyin;
        });
    });
    
    gridApi.setGridOption('rowData', filtered);
    lastFilteredCount = filtered.length;
    updateCount(filtered.length);
    
    // 实时显示找到的结果数量或未找到提示
    if (filtered.length > 0) {
        showFoundStatus(filtered.length);
    } else {
        showNotFoundStatus();
    }
    
    updateFilterStatus();
}

function updateCount(n) { 
    document.getElementById('recordCount').textContent = `当前: ${n} 条`; 
}

// 更新页脚记录数（根据当前表格显示的行数）
function updateFooterCount() {
    if (gridApi) {
        const displayedCount = gridApi.getDisplayedRowCount();
        document.getElementById('recordCount').textContent = `当前: ${displayedCount} 条`;
    }
}

function clearSearch() {
    if (notFoundTimer) {
        clearTimeout(notFoundTimer);
        notFoundTimer = null;
    }
    
    currentKeywords = [];
    cursorPosition = 0;
    renderSearchTags();
    input.value = '';
    currentSearchText = '';
    lastSearchedKeywordsStr = '';
    lastFilteredCount = allData.length;
    if (gridApi) gridApi.setGridOption('rowData', allData);
    updateCount(allData.length);
    input.focus();
    hideStatus();
    updateFilterStatus();
}

function autoSizeAll() { 
    if (gridApi) gridApi.autoSizeAllColumns(); 
}

function showFoundStatus(count) {
    badge.classList.remove('notfound');
    badge.classList.add('visible', 'found');
    iconSpan.textContent = '✅';
    statusText.textContent = `找到 ${count} 个`;
}

function showNotFoundStatus(query) {
    badge.classList.remove('found');
    badge.classList.add('visible', 'notfound');
    iconSpan.textContent = '❌';
    statusText.textContent = '未找到商品';
}

function hideStatus() {
    badge.classList.remove('visible');
}

// ==========================================
// 筛选状态显示 - 增强版（支持点击删除）
// ==========================================
// 列名映射（英文字段名 -> 中文显示名）
const columnNameMap = {
    'name': '商品名称',
    'cost': '进价（条）',
    'priceStrip': '售价（条）',
    'suggestStrip': '建议价（条）',
    'pricePack': '售价（包）',
    'suggestPack': '建议价（包）',
    'barcodeStrip': '条码',
    'barcodePack': '包码',
    'remark': '备注'
};

// 筛选类型映射
const filterTypeMap = {
    'equals': '等于',
    'notEqual': '不等于',
    'lessThan': '小于',
    'greaterThan': '大于',
    'lessThanOrEqual': '小于等于',
    'greaterThanOrEqual': '大于等于',
    'inRange': '范围',
    'contains': '包含',
    'notContains': '不包含',
    'startsWith': '开头为',
    'endsWith': '结尾为',
    'blank': '为空',
    'notBlank': '不为空'
};

// 存储当前筛选标签的信息，用于点击删除
let currentFilterTags = [];

function updateFilterStatus() {
    const filterStatus = document.getElementById('filterStatus');
    const filterTags = document.getElementById('filterTags');
    
    // 重置标签信息数组
    currentFilterTags = [];
    let tagsHtml = [];
    
    // 搜索框筛选
    if (currentSearchText.trim()) {
        const tagId = 'tag-search';
        currentFilterTags.push({
            id: tagId,
            type: 'search',
            data: currentSearchText.trim()
        });
        tagsHtml.push(`<span class="filter-tag search" id="${tagId}"><span class="tag-text">📝 搜索"${escapeHtml(currentSearchText.trim())}"</span></span>`);
    }
    
    // AG Grid 列筛选
    if (gridApi) {
        const filterModel = gridApi.getFilterModel();
        for (const field in filterModel) {
            const filter = filterModel[field];
            const colName = columnNameMap[field] || field;
            
            // 检查是否有多个条件
            if (filter.conditions && filter.conditions.length > 0) {
                // 多个条件
                const operator = filter.operator === 'AND' ? ' 且 ' : ' 或 ';
                const conditionTexts = filter.conditions.map(cond => {
                    const filterType = filterTypeMap[cond.type] || cond.type;
                    let filterValue = '';
                    if (cond.type === 'inRange') {
                        filterValue = `${cond.filter} ~ ${cond.filterTo}`;
                    } else if (cond.filter !== undefined) {
                        filterValue = cond.filter;
                    }
                    return `${filterType} ${filterValue}`;
                });
                const tagId = `tag-column-${field}`;
                currentFilterTags.push({
                    id: tagId,
                    type: 'column',
                    data: field
                });
                tagsHtml.push(`<span class="filter-tag column" id="${tagId}"><span class="tag-text">🔍 ${colName} ${conditionTexts.join(operator)}</span></span>`);
            } else {
                // 单个条件
                const filterType = filterTypeMap[filter.type] || filter.type;
                let filterValue = '';
                
                if (filter.type === 'inRange') {
                    filterValue = `${filter.filter} ~ ${filter.filterTo}`;
                } else if (filter.filter !== undefined) {
                    filterValue = filter.filter;
                }
                
                const tagId = `tag-column-${field}`;
                currentFilterTags.push({
                    id: tagId,
                    type: 'column',
                    data: field
                });
                tagsHtml.push(`<span class="filter-tag column" id="${tagId}"><span class="tag-text">🔍 ${colName} ${filterType} ${filterValue}</span></span>`);
            }
        }
    }
    
    // 获取当前显示的记录数
    let displayedCount = 0;
    if (gridApi) {
        displayedCount = gridApi.getDisplayedRowCount();
    }
    
    // 显示或隐藏状态区
    if (tagsHtml.length > 0) {
        filterStatus.classList.add('visible');
        filterTags.innerHTML = tagsHtml.join('');
        
        // 绑定点击事件
        currentFilterTags.forEach(tagInfo => {
            const tagElement = document.getElementById(tagInfo.id);
            if (tagElement) {
                tagElement.addEventListener('click', function() {
                    handleTagClick(tagInfo.id);
                });
            }
        });
    } else {
        filterStatus.classList.remove('visible');
    }
    
    // 同步更新页脚的记录数
    updateFooterCount();
}

// 处理标签点击 - 带动画效果
function handleTagClick(tagId) {
    const tagInfo = currentFilterTags.find(t => t.id === tagId);
    if (!tagInfo) return;
    
    const tagElement = document.getElementById(tagId);
    if (!tagElement) return;
    
    // 添加删除动画类
    tagElement.classList.add('removing');
    
    // 动画结束后执行删除操作（动画时长 0.35s）
    setTimeout(() => {
        if (tagInfo.type === 'search') {
            // 删除搜索标签，不重复播放动画
            clearSearchOnly(true, false);
            showToast('✅ 已删除搜索条件');
        } else if (tagInfo.type === 'column') {
            // 删除列筛选标签
            clearColumnFilter(tagInfo.data);
        }
    }, 350);
}

// 清除单个列的筛选（带动画反馈）
function clearColumnFilter(field) {
    if (gridApi) {
        gridApi.destroyFilter(field);
    }
    
    // 如果搜索框有内容，重新应用搜索
    if (currentSearchText.trim()) {
        filterData(currentSearchText);
    } else if (gridApi) {
        gridApi.setGridOption('rowData', allData);
        updateCount(allData.length);
        lastFilteredCount = allData.length;
    }
    
    updateFilterStatus();
    showToast('✅ 已删除此筛选条件');
}

// 给标签添加删除动画，返回 Promise
function animateTagRemove(tagElement) {
    return new Promise(resolve => {
        tagElement.classList.add('removing');
        setTimeout(resolve, 350);
    });
}

// 清除所有筛选标签的动画
async function animateAllTagsRemove(tagIds) {
    // 并行执行所有标签的删除动画
    const promises = tagIds.map(id => {
        const el = document.getElementById(id);
        if (el) return animateTagRemove(el);
        return Promise.resolve();
    });
    await Promise.all(promises);
}

function clearAllFilters() {
    // 获取所有标签ID
    const tagIds = currentFilterTags.map(t => t.id);
    
    if (tagIds.length === 0) {
        // 没有标签，直接执行
        input.value = '';
        currentSearchText = '';
        if (gridApi) {
            gridApi.setGridOption('rowData', allData);
        }
        updateCount(allData.length);
        lastFilteredCount = allData.length;
        hideStatus();
        input.focus();
        return;
    }
    
    // 先播放动画
    animateAllTagsRemove(tagIds).then(() => {
        // 动画完成后清除搜索关键字
        currentKeywords = [];
        cursorPosition = 0;
        renderSearchTags();
        input.value = '';
        currentSearchText = '';
        lastSearchedKeywordsStr = '';
        
        // 清除 AG Grid 筛选
        if (gridApi) {
            const filterModel = gridApi.getFilterModel();
            if (Object.keys(filterModel).length > 0) {
                Object.keys(filterModel).forEach(field => {
                    gridApi.destroyFilter(field);
                });
            }
            gridApi.setGridOption('rowData', allData);
        }
        
        // 更新显示
        updateCount(allData.length);
        lastFilteredCount = allData.length;
        hideStatus();
        updateFilterStatus();
        input.focus();
        
        showToast('✅ 已清除所有筛选条件');
    });
}

function clearSearchOnly(skipToast = false, withAnimation = true) {
    const searchTagId = 'tag-search';
    const searchTag = document.getElementById(searchTagId);
    
    // 如果需要动画且有搜索标签
    if (withAnimation && searchTag && currentSearchText.trim()) {
        animateTagRemove(searchTag).then(() => {
            executeClearSearch(skipToast);
        });
    } else {
        executeClearSearch(skipToast);
    }
}

function executeClearSearch(skipToast) {
    // 清除所有搜索关键字标签
    currentKeywords = [];
    cursorPosition = 0;
    renderSearchTags();
    input.value = '';
    currentSearchText = '';
    lastSearchedKeywordsStr = '';
    
    // 恢复到全部数据，但保留列筛选
    if (gridApi) {
        gridApi.setGridOption('rowData', allData);
    }
    
    // 更新显示
    updateCount(allData.length);
    lastFilteredCount = allData.length;
    hideStatus();
    updateFilterStatus();
    input.focus();
    
    if (!skipToast) {
        showToast('✅ 已清除搜索条件');
    }
}

function clearFilterOnly() {
    // 获取所有列筛选标签ID
    const columnTagIds = currentFilterTags
        .filter(t => t.type === 'column')
        .map(t => t.id);
    
    if (columnTagIds.length === 0) {
        // 没有列筛选标签
        showToast('✅ 当前没有列筛选条件');
        return;
    }
    
    // 先播放动画
    animateAllTagsRemove(columnTagIds).then(() => {
        // 清除 AG Grid 列筛选
        if (gridApi) {
            const filterModel = gridApi.getFilterModel();
            if (Object.keys(filterModel).length > 0) {
                Object.keys(filterModel).forEach(field => {
                    gridApi.destroyFilter(field);
                });
            }
        }
        
        // 如果搜索框有内容，重新应用搜索
        if (currentSearchText.trim()) {
            filterData(currentSearchText);
        } else {
            gridApi.setGridOption('rowData', allData);
            updateCount(allData.length);
            lastFilteredCount = allData.length;
        }
        
        updateFilterStatus();
        showToast('✅ 已清除列筛选条件');
    });
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[m]));
}

// ==========================================
// 自定义右键菜单
// ==========================================
let contextMenuTargetCell = null;

function initContextMenu() {
    const contextMenu = document.getElementById('contextMenu');
    const menuCopy = document.getElementById('menuCopy');
    
    // 监听表格区域的右键事件
    document.getElementById('myGrid').addEventListener('contextmenu', function(e) {
        e.preventDefault();
        
        // 找到最近的单元格
        const cell = e.target.closest('.ag-cell');
        if (cell) {
            contextMenuTargetCell = cell;
            
            // 定位菜单
            let x = e.clientX;
            let y = e.clientY;
            
            // 确保菜单不超出屏幕
            contextMenu.classList.add('visible');
            const menuWidth = contextMenu.offsetWidth;
            const menuHeight = contextMenu.offsetHeight;
            
            if (x + menuWidth > window.innerWidth) {
                x = window.innerWidth - menuWidth - 10;
            }
            if (y + menuHeight > window.innerHeight) {
                y = window.innerHeight - menuHeight - 10;
            }
            
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';
        }
    });
    
    // 复制功能
    menuCopy.addEventListener('click', function() {
        if (contextMenuTargetCell) {
            const text = contextMenuTargetCell.textContent || '';
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已复制到剪贴板');
            }).catch(() => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✅ 已复制到剪贴板');
            });
        }
        hideContextMenu();
    });
    
    // 点击其他地方隐藏菜单
    document.addEventListener('click', hideContextMenu);
    
    // 滚动时隐藏菜单
    document.addEventListener('scroll', hideContextMenu, true);
}

function hideContextMenu() {
    document.getElementById('contextMenu').classList.remove('visible');
}

// ==========================================
// 提示与Toast
// ==========================================
function updateInfoBox(hasFile, fileName, recordCount) {
    const infoBox = document.getElementById('infoBox');
    
    if (hasFile && fileName) {
        infoBox.className = 'info-box success';
        infoBox.innerHTML = `✅ 已自动加载文件：<b>${fileName}</b>（共 ${recordCount} 条）<br>💡 刷新页面会自动加载此文件，点击「导入 Excel」可更换文件。`;
    } else {
        infoBox.className = 'info-box';
        infoBox.innerHTML = `💡 点击「📂 导入 Excel」按钮导入商品数据，系统将自动记住您选择的文件。<br>📋 支持格式：.xlsx, .xls, .csv（文件大小限约4MB）`;
    }
}

function showToast(msg) {
    let t = document.getElementById('toast');
    if(!t) {
        t = document.createElement('div');
        t.id = 'toast';
        t.style.cssText = `position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:14px 28px; border-radius:8px; z-index:9999; opacity:0; transition:opacity 0.3s; font-size:18px; max-width: 90%; text-align: center;`;
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 3000);
}

// ==========================================
// 清除保存的数据
// ==========================================
function clearSavedData() {
    if (!confirm('确定要清除已保存的Excel数据吗？\n清除后需要重新导入文件。')) {
        return;
    }
    
    // 清除 localStorage 保存的数据
    clearData();
    
    // 清除搜索关键字
    currentKeywords = [];
    cursorPosition = 0;
    renderSearchTags();
    input.value = '';
    currentSearchText = '';
    
    // 清除 AG Grid 筛选
    if (gridApi) {
        gridApi.setFilterModel(null);
    }
    
    // 清空表格数据
    allData = [];
    if (gridApi) {
        gridApi.setGridOption('rowData', []);
    }
    
    // 更新显示
    document.getElementById('dataSource').innerHTML = `数据：<span class="file-name">未导入文件</span>`;
    document.getElementById('recordCount').textContent = `共 0 条`;
    
    // 隐藏筛选状态区和搜索状态
    document.getElementById('filterStatus').classList.remove('visible');
    hideStatus();
    
    updateInfoBox(false);
    input.focus();
    
    showToast('✅ 已清除保存的数据');
}

// ==========================================
// 清空表格数据

function loadDemoData() {
    allData = [];
    if (gridApi) {
        gridApi.setGridOption('rowData', []);
    }
    document.getElementById('dataSource').innerHTML = `数据：<span class="file-name">未导入文件</span>`;
    document.getElementById('recordCount').textContent = `共 0 条`;
}

// ==========================================
// 页面初始化
// ==========================================
function initApp() {
    console.log('🚀 开始初始化应用...');
    
    // 初始化 Grid
    const gridDiv = document.querySelector('#myGrid');
    document.getElementById('loadingIndicator').remove();
    gridApi = agGrid.createGrid(gridDiv, gridOptions);
    
    // 初始化扫码逻辑
    initScannerLogic();
    
    // 初始化全局扫描枪捕获（无焦点也能接收扫码）
    initGlobalScannerCapture();
    
    // 初始化右键菜单
    initContextMenu();
    
    // 尝试加载已保存的数据
    const savedData = loadData();
    
    if (savedData && savedData.fileData) {
        const formatted = parseExcelData(savedData.fileData);
        
        if (formatted.length > 0) {
            processData(formatted, savedData.fileName);
            updateInfoBox(true, savedData.fileName, formatted.length);
            showToast(`✅ 自动加载「${savedData.fileName}」，共 ${formatted.length} 条`);
        } else {
            loadDemoData();
            updateInfoBox(false);
        }
    } else {
        // 没有保存的数据，加载演示数据
        loadDemoData();
        updateInfoBox(false);
    }
    
    console.log('✅ 应用初始化完成');
}

// DOM 加载完成后初始化
document.addEventListener('DOMContentLoaded', initApp);

// 窗口大小变化时刷新 AG Grid 布局
window.addEventListener('resize', function() {
    if (gridApi) {
        // 使用防抖避免频繁刷新
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(function() {
            gridApi.autoSizeAllColumns();
        }, 100);
    }
});

// Service Worker 注册

        navigator.serviceWorker.register('./sw.js')

                console.log('✅ Service Worker 注册成功:', registration.scope);
            })
            .catch(err => {
                console.error('❌ Service Worker 注册失败:', err);
            });
    });
}
